/* RL ENGINE */
const dc=o=>JSON.parse(JSON.stringify(o));
const clampV=(v,a,b)=>Math.max(a,Math.min(b,v));
const clampState=s=>({trust:clampV(s.trust||0,0,100),revenue:clampV(s.revenue||0,0,100),capacity:clampV(s.capacity||0,0,100),cost:clampV(s.cost||0,0,100),risk:clampV(s.risk||0,0,100)});
const stateScore=s=>(s.trust*0.30+s.revenue*0.25+s.capacity*0.20+(100-s.cost)*0.15+(100-s.risk)*0.10)/100;
const rewardScore=(b,a)=>+((stateScore(a)-stateScore(b))*10).toFixed(4);
const bkt=v=>v<34?'L':v<67?'M':'H';
const sbkt=s=>`${bkt(s.trust)}${bkt(s.revenue)}${bkt(s.capacity)}${bkt(s.cost)}${bkt(s.risk)}`;
const qKey=(si,s)=>`${si}|${sbkt(s)}`;
const ensureQ=(qt,si,s,n)=>{const k=qKey(si,s);if(!qt[k])qt[k]=new Array(n).fill(0.01);return k;};
const safeStep=(sc,si)=>sc&&sc.steps&&si>=0&&si<sc.steps.length?sc.steps[si]:null;
const applyAction=(sc,si,ai,cur)=>{
  const step=safeStep(sc,si);if(!step||!step.actions||ai<0||ai>=step.actions.length)return null;
  const a=step.actions[ai];if(!a||!a.effects)return null;
  const e=a.effects;
  const ns=clampState({trust:(cur.trust||0)+(e.trust||0),revenue:(cur.revenue||0)+(e.revenue||0),capacity:(cur.capacity||0)+(e.capacity||0),cost:(cur.cost||0)+(e.cost||0),risk:(cur.risk||0)+(e.risk||0)});
  return{newState:ns,reward:rewardScore(cur,ns),effects:e,action:a};
};
const bestImmediate=(sc,si,s)=>{
  const step=safeStep(sc,si);if(!step)return 0;
  return step.actions.reduce((best,_,i)=>{const r=applyAction(sc,si,i,s);return r&&r.reward>best?r.reward:best;},-Infinity);
};
const train=(sc,eps=800)=>{
  const qt={},alpha=0.15,gamma=0.88;
  for(let ep=0;ep<eps;ep++){
    const e=Math.max(0.05,0.9*Math.pow(0.993,ep));let s=dc(sc.initialState);
    for(let si=0;si<sc.steps.length;si++){
      const step=sc.steps[si];if(!step)break;
      const n=step.actions.length,k=ensureQ(qt,si,s,n);
      const ai=Math.random()<e?Math.floor(Math.random()*n):qt[k].indexOf(Math.max(...qt[k]));
      const res=applyAction(sc,si,ai,s);if(!res)break;
      let maxNQ=0;
      if(si+1<sc.steps.length){const ns2=sc.steps[si+1];if(ns2){const nk=ensureQ(qt,si+1,res.newState,ns2.actions.length);maxNQ=Math.max(...qt[nk]);}}
      qt[k][ai]=qt[k][ai]+alpha*(res.reward+gamma*maxNQ-qt[k][ai]);
      s=res.newState;
    }
  }
  return qt;
};
const agentPolicy=(qt,sc,si,s)=>{
  const step=safeStep(sc,si);if(!step)return null;
  const k=ensureQ(qt,si,s,step.actions.length);const qv=qt[k];
  if(!qv||!qv.length)return null;
  return qv.indexOf(Math.max(...qv));
};
const updateQ=(qt,sc,si,ai,sb,sa,reward)=>{
  const step=safeStep(sc,si);if(!step)return{oldQ:0,newQ:0,key:''};
  const k=ensureQ(qt,si,sb,step.actions.length);const alpha=0.15,gamma=0.88;
  let maxNQ=0;
  if(si+1<sc.steps.length){const ns=sc.steps[si+1];if(ns){const nk=ensureQ(qt,si+1,sa,ns.actions.length);maxNQ=Math.max(...qt[nk]);}}
  const oq=qt[k][ai];const nq=oq+alpha*(reward+gamma*maxNQ-oq);qt[k][ai]=nq;
  return{oldQ:+oq.toFixed(3),newQ:+nq.toFixed(3),key:k};
};
const agentTotal=(sc,qt)=>{
  let s=dc(sc.initialState),tot=0;
  for(let i=0;i<sc.steps.length;i++){
    const ai=agentPolicy(qt,sc,i,s);if(ai===null)break;
    const r=applyAction(sc,i,ai,s);if(!r)break;
    tot+=r.reward;s=r.newState;
  }
  return+tot.toFixed(2);
};

const dirOf=reg=>reg<0.05?{t:'Optimal',c:P.green}:reg<0.4?{t:'Solid',c:P.green}:reg<0.9?{t:'Mixed',c:P.amber}:reg<1.8?{t:'Suboptimal',c:P.amber}:{t:'Costly',c:P.red};

/* BRANCH GRAPH */
function BranchGraph({run,selectedNode,onNodeClick}){
  const nodes=run.graphNodes,total=run.scenario.steps.length;
  if(nodes.length===0)return(
    <Card>
      <div style={{padding:'13px 20px',borderBottom:`1px solid ${P.border}`}}><Label>Decision graph</Label></div>
      <div style={{padding:'36px',textAlign:'center',color:P.dim,fontFamily:SERIF,fontSize:17,fontStyle:'italic'}}>Make your first decision. The graph builds step by step.</div>
    </Card>
  );
  const PAD=68,COLW=168,H=310,yA=58,yC=155,yG=252,rC=17,rS=7,rG=8;
  const W=PAD+(total+2)*COLW;
  const stageX=PAD-30;
  const legends=[{col:P.green,label:'Helped'},{col:P.amber,label:'Mixed'},{col:P.red,label:'Hurt'},{col:P.accent,label:'Agent pref',ring:true},{col:P.dim,label:'Alt branch',ghost:true}];
  return(
    <Card>
      <div style={{padding:'13px 20px',borderBottom:`1px solid ${P.border}`,display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8}}>
        <Label>Decision graph</Label>
        <div style={{display:'flex',gap:16,flexWrap:'wrap',alignItems:'center'}}>
          {legends.map(({col,label,ring,ghost})=>(
            <span key={label} style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:P.muted,fontFamily:SANS}}>
              <span style={{width:8,height:8,borderRadius:'50%',flexShrink:0,background:ghost?'transparent':col,border:(ring||ghost)?`2px solid ${col}`:'none'}}/>
              {label}
            </span>
          ))}
        </div>
      </div>
      <div style={{overflowX:'auto',padding:'6px 0 14px'}}>
        <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{display:'block',minWidth:W}}>
          <rect x={stageX} y={yA-28} width={W-stageX-COLW*0.5} height={yG-yA+68} rx={10} fill={P.s1} opacity={0.55}/>
          {[[yA,'ALT'],[yC,'YOU'],[yG,'AGT']].map(([y,lbl])=>(
            <g key={y}>
              <line x1={stageX+8} y1={y} x2={W-COLW*0.4} y2={y} stroke={P.border} strokeWidth={0.75} strokeDasharray="2,10"/>
              <text x={stageX+12} y={y+4} fill={P.dim} fontSize={8.5} fontFamily={MONO} letterSpacing="0.1em">{lbl}</text>
            </g>
          ))}
          <circle cx={PAD-20} cy={yC} r={5} fill={P.s3} stroke={P.border2} strokeWidth={1.5}/>
          <line x1={PAD-20} y1={yC} x2={PAD-2} y2={yC} stroke={P.border2} strokeWidth={1.5}/>
          {nodes.map((nd,i)=>{
            const x=PAD+(i+1)*COLW,px=i===0?PAD-20:PAD+i*COLW;
            const col=rewCol(nd.reward),isSel=selectedNode===i;
            const sameAgent=nd.agentIdx===nd.chosenIdx||nd.agentIdx===null;
            const cpx=(px+x)/2,dir=dirOf(nd.regret);
            const rewLabel=(nd.reward>=0?'+':'')+nd.reward.toFixed(2);
            const lblW=dir.t.length*5.5+12,lblH=14;
            return(
              <g key={i}>
                <path d={`M${px},${yC} C${cpx},${yC} ${cpx},${yC} ${x},${yC}`} fill="none" stroke={col} strokeWidth={3.5} opacity={0.85}/>
                {nd.altIdx!==null&&nd.altIdx!==nd.chosenIdx&&(
                  <g>
                    <line x1={x} y1={yA+rS} x2={x} y2={yC-rC} stroke={P.border} strokeWidth={0.75} strokeDasharray="2,4" opacity={0.5}/>
                    <path d={`M${px},${yC} C${px+55},${yC-80} ${x-55},${yA+35} ${x},${yA}`} fill="none" stroke={P.border2} strokeWidth={1.2} strokeDasharray="3,5" opacity={0.5}/>
                    <circle cx={x} cy={yA} r={rS} fill={P.s2} stroke={P.border2} strokeWidth={1.5} style={{cursor:'pointer'}} onClick={()=>onNodeClick(i)}/>
                    <text x={x} y={yA-rS-5} textAnchor="middle" fill={P.dim} fontSize={8} fontFamily={MONO}>{trunc(nd.altLabel||'',13)}</text>
                  </g>
                )}
                {!sameAgent&&(
                  <g>
                    <line x1={x} y1={yC+rC} x2={x} y2={yG-rG} stroke={P.accent} strokeWidth={0.75} strokeDasharray="2,4" opacity={0.45}/>
                    <path d={`M${px},${yC} C${px+55},${yC+80} ${x-55},${yG-35} ${x},${yG}`} fill="none" stroke={P.accent} strokeWidth={1.5} strokeDasharray="4,3" opacity={0.5}/>
                    <circle cx={x} cy={yG} r={rG} fill={P.accentL} stroke={P.accent} strokeWidth={2} style={{cursor:'pointer'}} onClick={()=>onNodeClick(i)}/>
                    <text x={x} y={yG+rG+13} textAnchor="middle" fill={P.accent} fontSize={8} fontFamily={MONO}>{trunc(nd.agentLabel||'',13)}</text>
                  </g>
                )}
                {isSel&&<>
                  <circle cx={x} cy={yC} r={rC+10} fill="none" stroke={col} strokeWidth={2} opacity={0.15}/>
                  <circle cx={x} cy={yC} r={rC+5} fill="none" stroke={col} strokeWidth={1.5} opacity={0.28}/>
                </>}
                <circle cx={x} cy={yC} r={rC} fill={col} stroke={isSel?P.text:'rgba(255,255,255,0.35)'} strokeWidth={isSel?2.5:1.5} style={{cursor:'pointer',filter:isSel?`drop-shadow(0 3px 10px ${col}99)`:`drop-shadow(0 1px 4px ${col}55)`}} onClick={()=>onNodeClick(i)}/>
                <text x={x} y={yC+4} textAnchor="middle" fill="rgba(255,255,255,0.92)" fontSize={9} fontFamily={MONO} fontWeight="500" style={{pointerEvents:'none'}}>{rewLabel}</text>
                <rect x={x-lblW/2} y={yC-rC-lblH-8} width={lblW} height={lblH} rx={4} fill={dir.c} opacity={0.12}/>
                <text x={x} y={yC-rC-lblH/2-8+4.5} textAnchor="middle" fill={dir.c} fontSize={9} fontFamily={SANS} fontWeight="600">{dir.t}</text>
                <text x={x} y={yC+rC+16} textAnchor="middle" fill={P.muted} fontSize={8.5} fontFamily={MONO}>S{i+1}</text>
                <text x={x} y={yC+rC+28} textAnchor="middle" fill={P.sub} fontSize={8.5} fontFamily={SANS}>{trunc(nd.chosenLabel||'',14)}</text>
              </g>
            );
          })}
          {nodes.length>0&&(()=>{
            const fx=PAD+(nodes.length+1)*COLW,lpx=PAD+nodes.length*COLW;
            const avgR=run.totalReward/Math.max(1,nodes.length),fc=rewCol(avgR);
            const isFSel=selectedNode==='final',d=15,lcpx=(lpx+fx)/2;
            return <g>
              <path d={`M${lpx},${yC} C${lcpx},${yC} ${lcpx},${yC} ${fx},${yC}`} fill="none" stroke={fc} strokeWidth={3.5} opacity={0.85}/>
              {isFSel&&<rect x={fx-(d+10)} y={yC-(d+10)} width={(d+10)*2} height={(d+10)*2} fill="none" stroke={fc} strokeWidth={1.5} opacity={0.18} rx={3} transform={`rotate(45 ${fx} ${yC})`}/>}
              <rect x={fx-d} y={yC-d} width={d*2} height={d*2} fill={fc} stroke={isFSel?P.text:'rgba(255,255,255,0.35)'} strokeWidth={isFSel?2.5:1.5} transform={`rotate(45 ${fx} ${yC})`} style={{cursor:'pointer',filter:isFSel?`drop-shadow(0 3px 12px ${fc}99)`:`drop-shadow(0 1px 5px ${fc}55)`}} onClick={()=>onNodeClick('final')}/>
              <text x={fx} y={yC+4} textAnchor="middle" fill="rgba(255,255,255,0.9)" fontSize={8.5} fontFamily={MONO} fontWeight="500" style={{pointerEvents:'none'}}>{(run.totalReward>=0?'+':'')+run.totalReward.toFixed(1)}</text>
              <text x={fx} y={yC+d+17} textAnchor="middle" fill={P.muted} fontSize={9} fontFamily={MONO}>FINAL</text>
              <text x={fx} y={yC+d+29} textAnchor="middle" fill={P.sub} fontSize={8.5} fontFamily={SANS}>Outcome</text>
            </g>;
          })()}
        </svg>
      </div>
    </Card>
  );
}

/* NODE DETAIL */
function NodeDetail({run,selectedNode}){
  if(selectedNode===null)return(
    <Card><div style={{padding:'20px 22px',textAlign:'center',color:P.dim,fontFamily:SERIF,fontSize:17,fontStyle:'italic'}}>Click any node in the graph above to inspect that decision</div></Card>
  );
  if(selectedNode==='final'){
    const agR=agentTotal(run.scenario,run.qtable),gap=run.totalReward-agR;
    return(
      <Card className="anim-fade">
        <div style={{padding:'20px 22px'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,flexWrap:'wrap',gap:8}}>
            <Label color={P.accent}>Final outcome node</Label>
            <Pill col={gap>=0?P.green:P.red} bg={gap>=0?P.greenL:P.redL}>{gap>=0?'Beat agent':'Below agent'}</Pill>
          </div>
          <h3 style={{fontFamily:SERIF,fontSize:21,fontWeight:500,fontStyle:'italic',color:P.text,marginBottom:16,lineHeight:1.2}}>This node summarises the full path you ended up taking.</h3>
          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
            {[{label:'Your reward',val:run.totalReward.toFixed(2),c:P.text},{label:'Agent reward',val:agR,c:P.accent},{label:'Gap',val:(gap>=0?'+':'')+gap.toFixed(2),c:gap>=0?P.green:P.red}].map(({label,val,c})=>(
              <div key={label} style={{flex:'1 1 90px',minWidth:0,background:P.s1,border:`1px solid ${P.border}`,borderRadius:6,padding:'10px 14px'}}>
                <Label size={9} style={{display:'block',marginBottom:4}}>{label}</Label>
                <div style={{fontFamily:MONO,fontSize:17,fontWeight:500,color:c}}>{val}</div>
              </div>
            ))}
          </div>
        </div>
      </Card>
    );
  }
  const nd=run.graphNodes[selectedNode];if(!nd)return null;
  const stepObj=safeStep(run.scenario,selectedNode);
  const choAct=stepObj&&stepObj.actions?stepObj.actions[nd.chosenIdx]:null;
  const agAct=nd.agentIdx!==null&&stepObj&&stepObj.actions?stepObj.actions[nd.agentIdx]:null;
  const dir=dirOf(nd.regret),rc=rewCol(nd.reward);
  const regCol=nd.regret>1?P.red:nd.regret>0.3?P.amber:P.green;
  return(
    <Card className="anim-fade">
      <div style={{padding:'20px 22px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,flexWrap:'wrap',gap:8}}>
          <Label color={P.accent}>Step {selectedNode+1}{stepObj?` — ${stepObj.title}`:''}</Label>
          <Pill col={dir.c} bg={rewBg(nd.reward)}>{dir.t}</Pill>
        </div>
        <h3 style={{fontFamily:SERIF,fontSize:20,fontWeight:500,fontStyle:'italic',color:P.text,marginBottom:14,lineHeight:1.2,wordBreak:'break-word'}}>{choAct?choAct.label:''}</h3>
        <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:14}}>
          {[{label:'Reward',val:nd.reward.toFixed(3),c:rc},{label:'Regret',val:nd.regret.toFixed(3),c:regCol}].map(({label,val,c})=>(
            <div key={label} style={{flex:'1 1 80px',minWidth:0,background:P.s1,border:`1px solid ${P.border}`,borderRadius:6,padding:'10px 14px'}}>
              <Label size={9} style={{display:'block',marginBottom:4}}>{label}</Label>
              <div style={{fontFamily:MONO,fontSize:17,fontWeight:500,color:c}}>{val}</div>
            </div>
          ))}
          <div style={{flex:'2 1 140px',minWidth:0,background:P.s1,border:`1px solid ${P.border}`,borderRadius:6,padding:'10px 14px'}}>
            <Label size={9} style={{display:'block',marginBottom:4}}>Agent preferred</Label>
            <div style={{fontSize:13,color:P.accent,fontFamily:SANS,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{agAct?agAct.label:'Same choice'}</div>
          </div>
        </div>
        {choAct&&<EffectChips effects={choAct.effects}/>}
      </div>
    </Card>
  );
}

/* FEEDBACK */
function Feedback({fb}){
  if(!fb)return null;
  const rc=fb.reward>1?P.green:fb.reward>0?P.amber:P.red;
  const rgc=fb.regret>0.5?P.amber:P.green;
  return(
    <Card className="anim-fade">
      <div style={{padding:'14px 20px',display:'flex',gap:16,alignItems:'flex-start',flexWrap:'wrap'}}>
        <div style={{flex:'2 1 160px',minWidth:0}}>
          <Label size={9} style={{display:'block',marginBottom:4}}>Latest outcome</Label>
          <div style={{fontSize:13,color:P.text,lineHeight:1.5,wordBreak:'break-word'}}>
            <span style={{fontWeight:600}}>{fb.chosenAction}</span>{' — '}
            <span style={{color:rc,fontFamily:MONO,fontWeight:500}}>{fb.reward>=0?'+':''}{fb.reward.toFixed(2)}</span>
            {' reward / regret '}
            <span style={{color:rgc,fontFamily:MONO,fontWeight:500}}>{fb.regret.toFixed(2)}</span>
          </div>
        </div>
        <div style={{flex:'2 1 140px',minWidth:0}}>
          <Label size={9} style={{display:'block',marginBottom:4}}>Agent preferred</Label>
          <div style={{fontSize:13,color:P.sub,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{fb.agentAction}</div>
        </div>
        <div style={{flex:'1 1 160px',minWidth:0,fontFamily:MONO,fontSize:10.5,color:P.muted,lineHeight:1.8,background:P.s1,border:`1px solid ${P.border}`,borderRadius:6,padding:'8px 12px'}}>
          Q-update{'\n'}<span style={{color:P.sub}}>{fb.qKey}</span>{'\n'}{fb.oldQ} to {fb.newQ}
        </div>
      </div>
    </Card>
  );
}

/* HISTORY RAIL */
function HistoryRail({run,selectedNode,onNodeClick}){
  if(!run.history.length)return null;
  return(
    <div>
      <Label size={9} style={{display:'block',marginBottom:10}}>Past decisions</Label>
      <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:6}}>
        {run.history.map((h,i)=>{
          const rc=rewCol(h.reward),rcb=rewBg(h.reward),sel=selectedNode===i;
          return(
            <div key={i} onClick={()=>onNodeClick(i)}
              style={{flexShrink:0,width:176,minWidth:0,background:P.white,border:`1.5px solid ${sel?P.accent:P.border}`,borderRadius:7,padding:'11px 13px',cursor:'pointer',transition:'border-color 0.18s'}}>
              <Label size={9} color={P.accent} style={{display:'block',marginBottom:3}}>Step {i+1}</Label>
              <div style={{fontSize:12,fontWeight:600,color:P.text,lineHeight:1.3,marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{h.actionLabel}</div>
              <div style={{fontSize:11,color:P.muted,marginBottom:7,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{h.stepTitle}</div>
              <div style={{display:'flex',gap:5}}>
                <span style={{fontFamily:MONO,fontSize:10,fontWeight:500,padding:'2px 7px',borderRadius:3,background:rcb,color:rc,border:`1px solid ${rc}33`}}>{h.reward>=0?'+':''}{h.reward.toFixed(1)}</span>
                <span style={{fontFamily:MONO,fontSize:10,fontWeight:500,padding:'2px 7px',borderRadius:3,background:P.s1,color:P.muted}}>rgr {h.regret.toFixed(1)}</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ACTION CARD */
function ActionCard({action:a,isRec,onChoose}){
  const[hov,setHov]=useState(false);
  return(
    <div onClick={onChoose} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{background:hov?P.s1:P.white,border:`1.5px solid ${isRec?P.accent:hov?P.border2:P.border}`,borderRadius:8,padding:'14px 16px',cursor:'pointer',transition:'all 0.18s',display:'flex',flexDirection:'column',gap:7,position:'relative',transform:hov?'translateY(-1px)':'none',boxShadow:hov?'0 4px 18px rgba(0,0,0,0.07)':'none',minWidth:0}}>
      {isRec&&<div style={{position:'absolute',top:0,left:0,width:'100%',height:2,background:P.accent,borderRadius:'8px 8px 0 0'}}/>}
      {isRec&&<div style={{paddingTop:4}}><Pill>Agent recommends</Pill></div>}
      <div style={{fontSize:13.5,fontWeight:600,color:P.text,lineHeight:1.3,wordBreak:'break-word'}}>{a.label}</div>
      <div style={{fontSize:12,color:P.muted,lineHeight:1.55,fontFamily:SERIF,fontStyle:'italic',wordBreak:'break-word'}}>{a.description}</div>
      <EffectChips effects={a.effects}/>
    </div>
  );
}

/* STEP CARD */
function StepCard({run,onChoose}){
  const sc=run.scenario,si=run.stepIdx,step=safeStep(sc,si);
  if(!step)return null;
  const agRec=agentPolicy(run.qtable,sc,si,run.cur);
  return(
    <Card className="anim-slide">
      <div style={{padding:'22px 24px 16px',borderBottom:`1px solid ${P.border}`}}>
        <Label size={10} color={P.accent} style={{display:'block',marginBottom:6}}>Step {si+1} of {sc.steps.length}</Label>
        <h2 style={{fontFamily:SERIF,fontWeight:500,fontSize:26,color:P.text,lineHeight:1.1,marginBottom:8}}>{step.title}</h2>
        <p style={{color:P.muted,fontSize:14,lineHeight:1.7,fontFamily:SERIF,fontStyle:'italic'}}>{step.description}</p>
      </div>
      <div style={{padding:'14px 24px',borderBottom:`1px solid ${P.border}`,display:'flex',gap:8,flexWrap:'wrap'}}>
        {VARS.map(k=><StatBar key={k} k={k} v={run.cur[k]}/>)}
      </div>
      <div style={{padding:'18px 24px 22px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        {step.actions.map((a,i)=><ActionCard key={i} action={a} isRec={i===agRec} onChoose={()=>onChoose(i)}/>)}
      </div>
    </Card>
  );
}

/* RAIL */
function Rail({run,phase,onReset}){
  const sc=run.scenario,done=run.history.length,total=sc.steps.length;
  const isComplete=phase==='complete';
  const agR=isComplete?agentTotal(sc,run.qtable):0;
  const gap=run.totalReward-agR;
  return(
    <div style={{width:242,flexShrink:0,background:P.s1,borderRight:`1px solid ${P.border}`,display:'flex',flexDirection:'column',overflowY:'auto',overflowX:'hidden'}}>
      <div style={{padding:'24px 20px',flex:1,display:'flex',flexDirection:'column',gap:16,position:'relative'}}>
        <div style={{position:'absolute',top:0,left:0,right:0,height:3,background:`linear-gradient(90deg,${P.accent},transparent)`}}/>
        <div>
          <Label size={9} color={P.accent} style={{display:'block',marginBottom:8}}>Active scenario</Label>
          <h2 style={{fontFamily:SERIF,fontSize:20,fontWeight:500,color:P.text,lineHeight:1.2,wordBreak:'break-word'}}>{sc.title}</h2>
        </div>
        <div style={{fontSize:12,color:P.muted,lineHeight:1.6,padding:'10px 12px',background:P.white,border:`1px solid ${P.border}`,borderRadius:6,fontFamily:SERIF,fontStyle:'italic',wordBreak:'break-word'}}>{sc.objective}</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:5}}><Tag>{sc.domain}</Tag><Tag>{sc.focus}</Tag></div>
        <div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:6,alignItems:'center'}}>
            <Label size={9}>Progress</Label>
            <span style={{fontFamily:MONO,fontSize:12,color:P.sub}}>{done}/{total}</span>
          </div>
          <div style={{height:4,background:P.s3,borderRadius:2,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${Math.round(done/total*100)}%`,background:P.accent,borderRadius:2,transition:'width 0.4s ease'}}/>
          </div>
        </div>
        <div style={{background:P.white,border:`1px solid ${P.border}`,borderRadius:6,padding:'10px 14px'}}>
          <Label size={9} style={{display:'block',marginBottom:4}}>Cumulative regret</Label>
          <div style={{fontFamily:MONO,fontSize:20,fontWeight:500,color:run.totalRegret>2?P.red:run.totalRegret<0.3?P.green:P.amber}}>{run.totalRegret.toFixed(2)}</div>
        </div>
        {isComplete&&(
          <div style={{borderTop:`1px solid ${P.border}`,paddingTop:14}}>
            <Label size={9} style={{display:'block',marginBottom:10}}>Run summary</Label>
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {[{label:'Your reward',val:run.totalReward.toFixed(2),c:P.text},{label:'Agent reward',val:agR,c:P.accent},{label:'Gap vs agent',val:(gap>=0?'+':'')+gap.toFixed(2),c:gap>=0?P.green:P.red}].map(({label,val,c})=>(
                <div key={label} style={{background:P.white,border:`1px solid ${P.border}`,borderRadius:6,padding:'9px 13px',display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,minWidth:0}}>
                  <Label size={9}>{label}</Label>
                  <span style={{fontFamily:MONO,fontSize:14,fontWeight:500,color:c,flexShrink:0}}>{val}</span>
                </div>
              ))}
            </div>
          </div>
        )}
        <div style={{marginTop:'auto',paddingTop:14,borderTop:`1px solid ${P.border}`}}>
          <GhostBtn onClick={onReset} full>Reset and switch</GhostBtn>
        </div>
      </div>
    </div>
  );
}

/* WORKSPACE */
function Workspace({run,phase,selectedNode,onChoose,onReset,onNodeClick}){
  const isComplete=phase==='complete';
  return(
    <div style={{display:'flex',height:'100vh',overflow:'hidden',background:P.bg}}>
      <Rail run={run} phase={phase} onReset={onReset}/>
      <div style={{flex:1,overflowY:'auto',overflowX:'hidden',display:'flex',flexDirection:'column',gap:16,padding:'24px'}}>
        {isComplete?(
          <>
            <div style={{background:P.white,border:`1px solid ${P.border}`,borderRadius:10,padding:'16px 22px'}}>
              <Label size={9} style={{display:'block',marginBottom:5}}>Run complete</Label>
              <p style={{fontSize:13,color:P.muted,fontFamily:SERIF,fontStyle:'italic'}}>Click any node in the graph to inspect how each decision shaped the outcome.</p>
            </div>
            <BranchGraph run={run} selectedNode={selectedNode} onNodeClick={onNodeClick}/>
            <NodeDetail run={run} selectedNode={selectedNode}/>
            <Feedback fb={run.latestFb}/>
            <HistoryRail run={run} selectedNode={selectedNode} onNodeClick={onNodeClick}/>
          </>
        ):(
          <>
            <StepCard run={run} onChoose={onChoose}/>
            <BranchGraph run={run} selectedNode={selectedNode} onNodeClick={onNodeClick}/>

            {selectedNode!==null&&<NodeDetail run={run} selectedNode={selectedNode}/>}
            <HistoryRail run={run} selectedNode={selectedNode} onNodeClick={onNodeClick}/>
          </>
        )}
      </div>
    </div>
  );
}

      {sel&&<div style={{position:'absolute',top:0,left:0,right:0,height:3,background:P.accent,borderRadius:'9px 9px 0 0'}}/>}
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:8}}>
        <div style={{fontSize:12.5,fontWeight:600,color:P.text,fontFamily:SANS,lineHeight:1.3,flex:1,minWidth:0}}>{sc.title}</div>
        {sel&&<div style={{flexShrink:0,width:7,height:7,borderRadius:'50%',background:P.accent,marginTop:4}}/>}

      <div style={{display:'flex',flexWrap:'wrap',gap:4,marginTop:'auto',paddingTop:4}}>

        <Tag>{sc.steps.length} steps</Tag>

}

function Landing({selectedId,onSelect,onStart}){
  const sc=SCENARIOS.find(s=>s.id===selectedId)||SCENARIOS[0];
  return(
    <div style={{maxWidth:1280,margin:'0 auto',padding:'32px 32px 48px',minHeight:'100vh',display:'flex',flexDirection:'column',gap:28}}>

        <div>
          <Label size={10} color={P.accent} style={{display:'block',marginBottom:10}}>RL Branch Explorer</Label>
          <h1 style={{fontFamily:SERIF,fontWeight:500,fontSize:'clamp(30px,4vw,52px)',lineHeight:1.05,color:P.text}}>Sequential decisions.<br/><em>Real consequences.</em></h1>
        </div>
        <p style={{color:P.muted,fontSize:14,fontFamily:SERIF,fontStyle:'italic',lineHeight:1.7,maxWidth:300}}>Pick a scenario. Make decisions step by step. Compare your path against the trained RL agent.</p>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'300px 1fr',gap:24,alignItems:'start'}}>
        <Card style={{position:'relative'}}>
          <div style={{position:'absolute',top:0,left:0,right:0,height:3,borderRadius:'10px 10px 0 0',background:`linear-gradient(90deg,${P.accent},transparent)`}}/>

            <div>
              <Label size={9} style={{display:'block',marginBottom:8}}>Selected</Label>
              <h2 style={{fontFamily:SERIF,fontSize:22,fontWeight:500,lineHeight:1.15,color:P.text,wordBreak:'break-word'}}>{sc.title}</h2>
              <p style={{color:P.muted,fontSize:13,lineHeight:1.7,marginTop:8,fontFamily:SERIF,fontStyle:'italic'}}>{sc.premise}</p>
            </div>
            <div style={{background:P.s1,border:`1px solid ${P.border}`,borderRadius:7,padding:'12px 14px'}}>
              <Label size={9} color={P.accent} style={{display:'block',marginBottom:5}}>Objective</Label>
              <p style={{fontSize:12.5,color:P.text,lineHeight:1.6,wordBreak:'break-word'}}>{sc.objective}</p>
            </div>
            <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
              <Tag>{sc.domain}</Tag><Tag>{sc.steps.length} steps</Tag><Tag>{sc.focus}</Tag>
            </div>
            <div style={{display:'flex',gap:8}}>
              <div style={{flex:'0 0 auto',background:P.s1,border:`1px solid ${P.border}`,borderRadius:6,padding:'10px 16px'}}>
                <Label size={9} style={{display:'block',marginBottom:3}}>Steps</Label>
                <div style={{fontFamily:MONO,fontSize:18,fontWeight:500,color:P.text}}>{sc.steps.length}</div>
              </div>
              <div style={{flex:'0 0 auto',background:P.s1,border:`1px solid ${P.border}`,borderRadius:6,padding:'10px 16px'}}>
                <Label size={9} style={{display:'block',marginBottom:3}}>Status</Label>
                <div style={{fontFamily:MONO,fontSize:13,fontWeight:500,color:P.green}}>Ready</div>
              </div>
            </div>
            <PrimaryBtn onClick={onStart}>Initialize scenario</PrimaryBtn>
            <div style={{fontSize:11.5,color:P.dim,lineHeight:1.7,fontFamily:SERIF,fontStyle:'italic',paddingTop:4,borderTop:`1px solid ${P.border}`}}>The RL agent trains 800 episodes on your chosen scenario before the run begins.</div>
          </div>
        </Card>
        <div style={{display:'flex',flexDirection:'column',gap:20}}>
          {ROWS.map(rowLabel=>{
            const rowScenarios=SCENARIOS.filter(s=>s.row===rowLabel);
            return(
              <div key={rowLabel}>
                <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
                  <Label size={9} color={P.accent}>{rowLabel}</Label>
                  <div style={{flex:1,height:1,background:P.border}}/>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
                  {rowScenarios.map(s=>(
                    <ScenarioCard key={s.id} sc={s} sel={s.id===selectedId} onSelect={onSelect}/>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* APP */
function App(){
  const[phase,setPhase]=useState('landing');
  const[selectedId,setSelectedId]=useState(SCENARIOS[0].id);
  const[run,setRun]=useState(null);
  const[selectedNode,setSelectedNode]=useState(null);

  const handleStart=useCallback(()=>{
    const sc=SCENARIOS.find(s=>s.id===selectedId)||SCENARIOS[0];
    setRun({scenario:sc,qtable:train(sc),stepIdx:0,cur:dc(sc.initialState),history:[],graphNodes:[],latestFb:null,totalReward:0,totalRegret:0});
    setSelectedNode(null);setPhase('running');
  },[selectedId]);

  const handleReset=useCallback(()=>{setPhase('landing');setRun(null);setSelectedNode(null);},[]);

  const handleChoose=useCallback(ai=>{
    if(!run||phase!=='running')return;
    const sc=run.scenario,si=run.stepIdx,step=safeStep(sc,si);if(!step)return;
    const sb=dc(run.cur);
    const res=applyAction(sc,si,ai,sb);if(!res)return;
    const bestR=bestImmediate(sc,si,sb);
    const regret=Math.max(0,+(bestR-res.reward).toFixed(4));
    const agRec=agentPolicy(run.qtable,sc,si,sb);
    const agAct=agRec!==null&&step.actions[agRec]?step.actions[agRec].label:'N/A';
    const qRes=updateQ(run.qtable,sc,si,ai,sb,res.newState,res.reward);
    let altIdx=null,altR=-Infinity;
    step.actions.forEach((_,i)=>{if(i===ai)return;const ar=applyAction(sc,si,i,sb);if(ar&&ar.reward>altR){altR=ar.reward;altIdx=i;}});
    const newRun={...run,cur:res.newState,stepIdx:si+1,totalReward:run.totalReward+res.reward,totalRegret:run.totalRegret+regret,
      graphNodes:[...run.graphNodes,{chosenIdx:ai,agentIdx:agRec,altIdx,
        chosenLabel:step.actions[ai].label,
        agentLabel:agRec!==null&&step.actions[agRec]?step.actions[agRec].label:'',
        altLabel:altIdx!==null?step.actions[altIdx].label:'',
        reward:res.reward,regret,effects:res.effects}],
      history:[...run.history,{stepTitle:step.title,actionLabel:step.actions[ai].label,reward:res.reward,regret}],
      latestFb:{chosenAction:step.actions[ai].label,reward:res.reward,regret,agentAction:agAct,oldQ:qRes.oldQ,newQ:qRes.newQ,qKey:qRes.key}};
    setRun(newRun);
    if(si+1>=sc.steps.length){setPhase('complete');setSelectedNode('final');}
  },[run,phase]);

  return(
    <div style={{background:P.bg,minHeight:'100vh',color:P.text,fontFamily:SANS,fontSize:14,lineHeight:1.6}}>
      {phase==='landing'
        ?<Landing selectedId={selectedId} onSelect={setSelectedId} onStart={handleStart}/>
        :<Workspace run={run} phase={phase} selectedNode={selectedNode} onChoose={handleChoose} onReset={handleReset} onNodeClick={setSelectedNode}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
